<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <rect width="1200" height="500" fill="#F5A500"/>
  <text x="60" y="70" font-family="sans-serif" font-size="11" font-weight="600" fill="#0D0D0D" letter-spacing="4" opacity="0.5">BRAND PERSONALITY</text>
  <rect x="60" y="82" width="40" height="2" fill="#0D0D0D" opacity="0.4"/>

  <!-- Big words -->
  <text x="58" y="230" font-family="sans-serif" font-weight="900" font-size="130" fill="#0D0D0D" letter-spacing="-4" opacity="0.12">BOLD</text>
  <text x="58" y="230" font-family="sans-serif" font-weight="900" font-size="130" fill="#0D0D0D" letter-spacing="-4" opacity="0.0">BOLD</text>

  <!-- Traits -->
  <text x="60" y="190" font-family="sans-serif" font-weight="900" font-size="56" fill="#0D0D0D" letter-spacing="-1">Bold.</text>
  <text x="310" y="190" font-family="sans-serif" font-weight="900" font-size="56" fill="#2B2BFF" letter-spacing="-1">Raw.</text>
  <text x="520" y="190" font-family="sans-serif" font-weight="900" font-size="56" fill="#0D0D0D" letter-spacing="-1">Playful.</text>
  <text x="820" y="190" font-family="sans-serif" font-weight="900" font-size="56" fill="#2B2BFF" letter-spacing="-1">Free.</text>

  <rect x="60" y="220" width="1080" height="1" fill="#0D0D0D" opacity="0.15"/>

  <text x="60" y="300" font-family="sans-serif" font-size="22" fill="#0D0D0D" opacity="0.7" font-style="italic">"Inspired by movement, driven by creativity.</text>
  <text x="60" y="335" font-family="sans-serif" font-size="22" fill="#0D0D0D" opacity="0.7" font-style="italic"> Designed for those who dare to stand out."</text>

  <!-- Tags -->
  <rect x="60" y="400" width="130" height="36" rx="18" fill="#0D0D0D" opacity="0.12"/>
  <text x="125" y="424" font-family="sans-serif" font-size="12" fill="#0D0D0D" text-anchor="middle" letter-spacing="2">SKATE</text>

  <rect x="210" y="400" width="160" height="36" rx="18" fill="#0D0D0D" opacity="0.12"/>
  <text x="290" y="424" font-family="sans-serif" font-size="12" fill="#0D0D0D" text-anchor="middle" letter-spacing="2">STREETWEAR</text>

  <rect x="390" y="400" width="150" height="36" rx="18" fill="#0D0D0D" opacity="0.12"/>
  <text x="465" y="424" font-family="sans-serif" font-size="12" fill="#0D0D0D" text-anchor="middle" letter-spacing="2">IDENTITY</text>

  <rect x="560" y="400" width="150" height="36" rx="18" fill="#0D0D0D" opacity="0.12"/>
  <text x="635" y="424" font-family="sans-serif" font-size="12" fill="#0D0D0D" text-anchor="middle" letter-spacing="2">CHARACTER</text>
</svg>
