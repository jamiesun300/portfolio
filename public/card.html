<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jamie Sun — Visual Designer</title>
  <meta name="description" content="Multidisciplinary designer & photographer based in Taipei, Taiwan." />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      gap: 28px;
      padding: 60px 20px;
    }

    .hint {
      color: #555;
      font-size: 10px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      user-select: none;
    }

    /* ── Card shell ── */
    .card-wrap {
      width: min(520px, 92vw);
      aspect-ratio: 3.5 / 2;
      perspective: 1400px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
    }

    .card-wrap.flipped .card { transform: rotateY(180deg); }

    .face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
      background: #fff;
      box-shadow: 0 24px 72px rgba(0,0,0,0.55);
    }

    /* ── FRONT ── */
    .front img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── BACK ── */
    .back {
      transform: rotateY(180deg);
      padding: clamp(18px, 5%, 28px) clamp(20px, 6%, 32px);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .back-top {
      font-size: clamp(9px, 2.2vw, 11.5px);
      color: #333;
      letter-spacing: 0.04em;
      line-height: 1.8;
    }

    .back-top span {
      color: #bbb;
      margin: 0 5px;
      font-size: 8px;
    }

    .back-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .back-contact {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .back-contact a {
      font-size: clamp(9px, 2vw, 11px);
      color: #444;
      text-decoration: none;
    }

    .back-contact a:hover { color: #000; }

    .back-contact .dim {
      font-size: clamp(8px, 1.8vw, 10px);
      color: #999;
      margin-top: 3px;
    }

    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    .qr-wrap img {
      width: clamp(60px, 16vw, 84px);
      height: clamp(60px, 16vw, 84px);
      border: 1px solid #eee;
      padding: 3px;
      border-radius: 4px;
    }

    .qr-label {
      font-size: 8px;
      color: #bbb;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <p class="hint">Tap to flip</p>

  <div class="card-wrap" id="cardWrap">
    <div class="card">

      <!-- ── FRONT ── -->
      <div class="face front">
        <img
          src="/images/hero-card.png"
          alt="Jamie Sun"
        />
      </div>

      <!-- ── BACK ── -->
      <div class="face back">
        <div class="back-top">
          Graphic Design<span>•</span>Branding<span>•</span>Editorial<span>•</span>Creative Direction<span>•</span>Illustration
        </div>
        <div class="back-bottom">
          <div class="back-contact">
            <a href="mailto:sunchiehming@gmail.com">sunchiehming@gmail.com</a>
            <a href="tel:+886930101201">+886 930 101 201</a>
            <a href="tel:+13109938138">+1 310 993 8138</a>
            <a href="https://www.linkedin.com/in/chiehmingsun" class="dim" target="_blank">linkedin.com/in/chiehmingsun</a>
            <a href="https://portfolio-jamie-sun.vercel.app" class="dim" target="_blank">portfolio-jamie-sun.vercel.app</a>
          </div>
          <div class="qr-wrap">
            <img
              src="https://api.qrserver.com/v1/create-qr-code/?size=168x168&data=https://portfolio-jamie-sun.vercel.app&bgcolor=ffffff&color=000000&margin=4"
              alt="Portfolio QR Code"
            />
            <span class="qr-label">Portfolio</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <p class="hint"><a href="https://portfolio-jamie-sun.vercel.app" style="color:#555; text-decoration:none;">portfolio-jamie-sun.vercel.app</a></p>

  <script>
    const wrap = document.getElementById('cardWrap');
    wrap.addEventListener('click', () => wrap.classList.toggle('flipped'));
  </script>
</body>
</html>
